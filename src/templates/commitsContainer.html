<div id="commits-outside-container" class="stc-panel">
  <section class="stc-shell stc-shell--graph">
    <div class="stc-shell__head">
      <div>
        <p class="stc-shell__eyebrow">Commit graph</p>
        <h2 class="stc-shell__title">Branch lanes</h2>
      </div>
    </div>

    <div id="branchLabels" class="stc-branch-labels"></div>

    <div class="stc-graph-scroll">
      <svg id="graphSvg" class="stc-graph" aria-label="Repository commit graph"></svg>
    </div>
  </section>

  <section class="stc-shell stc-shell--list">
    <div class="stc-shell__head">
      <div>
        <p class="stc-shell__eyebrow">Commits</p>
        <h2 class="stc-shell__title">Recent history</h2>
      </div>
      <p id="listSummary" class="stc-shell__summary"></p>
    </div>

    <ol id="commits-container" class="stc-commit-list"></ol>
  </section>
</div>
